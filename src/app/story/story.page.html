<ion-content class="story-page" fullscreen [scrollY]="false">
  <div class="sp-shell">
    <div class="sp-fixed">
    <div class="sp-topbar vs-sticky-topbar">
      <div class="sp-brand">
        <img class="sp-avatar" src="assets/story.png" alt="" />
        <div class="sp-brand-name">VideoStory</div>
      </div>

      <button type="button" class="sp-icon-btn" aria-label="Notifications">
        <ion-icon name="notifications-outline"></ion-icon>
      </button>
    </div>

      <div class="sp-hero" id="hero-card" (pointerup)="onHeroPointerUp($event)">
        <video
          id="story-video"
          class="sp-video"
          playsinline
          preload="metadata"
          [attr.poster]="heroImageUrl"
        ></video>

        <div class="sp-hero-dim" aria-hidden="true"></div>

        <div class="sp-seek-hud sp-seek-hud--left" [class.show]="seekHudSide === 'left'">{{ seekHudText }}</div>
        <div class="sp-seek-hud sp-seek-hud--right" [class.show]="seekHudSide === 'right'">{{ seekHudText }}</div>

      <button class="sp-fs-btn" type="button" (click)="toggleFullscreen($event)" aria-label="Fullscreen">
        <ion-icon [name]="isFullscreen ? 'contract-outline' : 'expand-outline'"></ion-icon>
      </button>

      <button *ngIf="!isFullscreen" class="sp-hero-play" type="button" (click)="togglePlay()" aria-label="Play">
        <ion-icon [name]="isPlaying ? 'pause' : 'play'"></ion-icon>
      </button>
    </div>

    <div class="sp-progress">
      <ion-range
        class="sp-range"
        [min]="0"
        [max]="durationSec || 0"
        [value]="seeking ? seekingValueSec : currentTimeSec"
        [pin]="false"
        (ionKnobMoveStart)="onSeekStart()"
        (ionInput)="onSeekInput($event)"
        (ionKnobMoveEnd)="onSeekEnd($event)"
      ></ion-range>

      <div class="sp-time-row">
        <div class="sp-time">{{ formatTime(currentTimeSec) }}</div>
        <div class="sp-time">{{ formatTime(durationSec) }}</div>
      </div>
    </div>

    <div class="sp-meta">
      <div class="sp-episode">{{ episodeSeasonLabel }}</div>
      <div class="sp-title">{{ currentEpisode?.title || story?.title || 'Story' }}</div>

      <!-- <div class="sp-author">
        <img class="sp-author-avatar" src="assets/story.png" alt="" />
        <div class="sp-author-name">{{ authorName }}</div>
        <div class="sp-dot" aria-hidden="true">&#8226;</div>
        <div class="sp-views" *ngIf="viewsLabel">{{ viewsLabel }} views</div>
      </div> -->
    </div>

    <!-- <div class="sp-controls">
      <button type="button" class="sp-ctrl sp-ctrl--left" (click)="seekBy(-10)">
        <ion-icon name="play-back"></ion-icon>
        <div class="sp-ctrl-label">Rewind</div>
      </button>

      <button type="button" class="sp-ctrl sp-ctrl--icon" (click)="playPrevEpisode()" aria-label="Previous">
        <ion-icon name="play-skip-back-outline"></ion-icon>
      </button>

      <button type="button" class="sp-ctrl sp-ctrl--main" (click)="togglePlay()" aria-label="Play/Pause">
        <ion-icon [name]="isPlaying ? 'pause' : 'play'"></ion-icon>
      </button>

      <button type="button" class="sp-ctrl sp-ctrl--icon" (click)="playNextEpisode()" aria-label="Next">
        <ion-icon name="play-skip-forward-outline"></ion-icon>
      </button>

      <button type="button" class="sp-ctrl sp-ctrl--right" (click)="cyclePlaybackRate()">
        <div class="sp-speed">{{ playbackRateLabel }}</div>
        <div class="sp-ctrl-label">Speed</div>
      </button>
    </div> -->

	    <div class="sp-next-head">
	      <div class="sp-next-title">Next Episodes</div>
	      <button type="button" class="sp-autoplay" (click)="toggleAutoplay()" [disabled]="!nextEpisodes?.length">
	        Autoplay {{ autoplayOn ? 'ON' : 'OFF' }}
	      </button>
	    </div>

    </div>
	
	    <div class="sp-playlist">
	    <div class="sp-next-list" *ngIf="nextEpisodes?.length; else noEpisodesTpl">
	      <button
	        type="button"
	        class="sp-next-card"
	        *ngFor="let ep of nextEpisodes; let i = index"
	        (click)="playEpisode(ep)"
	      >
	        <div class="sp-next-thumb">
	          <img class="sp-next-img" [src]="toThumb(ep)" alt="" (error)="onImgError($event)" />
	          <div class="sp-next-time">{{ getEpisodeDuration(ep, i) }}</div>
	        </div>
	
	        <div class="sp-next-meta">
	          <div class="sp-next-top">
	            <div class="sp-next-ep" [class.next]="getEpisodeListLabel(ep, i).startsWith('NEXT')">
	              {{ getEpisodeListLabel(ep, i) }}
	            </div>
	            <div class="sp-playing" *ngIf="isEpisodeActive(ep)">PLAYING</div>
	          </div>
	          <div class="sp-next-name">{{ ep?.title || ('Episode ' + (ep?.episodeNumber || '')) }}</div>
	          <div class="sp-next-sub">{{ ep?.description || ep?.summary || '...' }}</div>
	        </div>
	      </button>
	    </div>
	
	    <ng-template #noEpisodesTpl>
	      <div class="sp-next-empty" *ngIf="episodesLoaded">No Episode Available</div>
	    </ng-template>
	
	  </div>
	  </div>

  <ng-container *ngIf="isAdmin; else storyCustomerNav">
    <div class="sp-bottom-nav">
      <button type="button" class="sp-nav-item" [class.active]="activeBottomTab === 'home'" (click)="setBottomTab('home')">
        <ion-icon name="home-outline"></ion-icon>
        <span>Home</span>
      </button>

      <button type="button" class="sp-nav-item" [class.active]="activeBottomTab === 'explore'" (click)="setBottomTab('explore')">
        <ion-icon name="compass-outline"></ion-icon>
        <span>Explore</span>
      </button>

      <button type="button" class="sp-nav-item sp-nav-item--center" [class.active]="activeBottomTab === 'story'" (click)="setBottomTab('story')" aria-label="Story">
        <div class="sp-center-pill">
          <ion-icon name="film-outline"></ion-icon>
        </div>
      </button>

      <button type="button" class="sp-nav-item" [class.active]="activeBottomTab === 'library'" (click)="setBottomTab('library')">
        <ion-icon name="play-outline"></ion-icon>
        <span>User</span>
      </button>

      <button type="button" class="sp-nav-item" [class.active]="activeBottomTab === 'profile'" (click)="setBottomTab('profile')">
        <ion-icon name="person-outline"></ion-icon>
        <span>Profile</span>
      </button>
    </div>
  </ng-container>

  <ng-template #storyCustomerNav>
    <div class="sp-bottom-nav sp-bottom-nav--3">
      <button type="button" class="sp-nav-item" (click)="setBottomTab('home')">
        <ion-icon name="home-outline"></ion-icon>
        <span>Home</span>
      </button>

      <button type="button" class="sp-nav-item" (click)="setBottomTab('explore')">
        <ion-icon name="compass-outline"></ion-icon>
        <span>Explore</span>
      </button>

      <button type="button" class="sp-nav-item" (click)="setBottomTab('profile')">
        <ion-icon name="person-outline"></ion-icon>
        <span>Profile</span>
      </button>
    </div>
  </ng-template>
</ion-content>
