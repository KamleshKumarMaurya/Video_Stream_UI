<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Stories</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="home-hero">
    <h1>Discover stories</h1>
    <p>Pick a story and start listening episode-wise</p>
  </div>

  <ion-grid>
    <ion-row>
      <ion-col size="12" size-sm="6" size-md="4" *ngFor="let s of stories">
        <ion-card (click)="openStory(s)" class="story-card">
          <div class="thumb">
            <img [src]="storyService.toAbsUrl(s.thumbnail) || 'assets/icon/favicon.png' " alt="cover" />
            <div class="overlay">
              <ion-icon name="play-circle" class="play-icon"></ion-icon>
            </div>
          </div>
          <ion-card-header>
            <div class="card-head">
              <ion-card-title>{{s.title}}</ion-card-title>
            </div>
            <ion-card-subtitle *ngIf="s.author">{{s.author}}</ion-card-subtitle>
          </ion-card-header>
          <ion-card-content>
            <p class="muted">{{s.shortDescription || s.description || ''}}</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
