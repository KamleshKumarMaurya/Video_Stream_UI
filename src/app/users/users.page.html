<ion-content class="users-page" fullscreen>
  <div class="users-bg" aria-hidden="true"></div>

  <div class="users-wrap">
    <div class="users-topbar vs-sticky-topbar">
      <div class="users-title">Customers</div>
      <button type="button" class="users-refresh" (click)="loadCustomers(true)" [disabled]="isLoading" aria-label="Refresh">
        <ion-icon name="refresh-outline"></ion-icon>
      </button>
    </div>

    <div class="users-sub">Toggle Active status</div>

    <div class="users-list">
      <div class="user-card" *ngFor="let c of customers">
        <div class="user-main">
          <div class="user-name">{{ c?.mobileNo || c?.email || ('Customer #' + c?.id) }}</div>
          <div class="user-meta">
            <span>ID: {{ c?.id }}</span>
            <span *ngIf="c?.subscriptionActive; else subOff">Subscription: Active</span>
            <ng-template #subOff><span>Subscription: Inactive</span></ng-template>
          </div>
        </div>

        <ion-toggle
          [checked]="!!c?.active"
          (ionChange)="toggleActive(c, $event)"
          [disabled]="isUpdating(c)"
        ></ion-toggle>
      </div>
    </div>

    <ion-button
      expand="block"
      class="load-more"
      *ngIf="!isLastPage"
      (click)="loadCustomers(false)"
      [disabled]="isLoading"
    >
      {{ isLoading ? 'Loading...' : 'Load More' }}
    </ion-button>

    <div class="users-bottom-space" aria-hidden="true"></div>
  </div>

  <div class="users-bottom-nav">
    <button type="button" class="nav-item" [class.active]="activeBottomTab === 'home'" (click)="setBottomTab('home')">
      <ion-icon name="home-outline"></ion-icon>
      <span>Home</span>
    </button>

    <button type="button" class="nav-item" [class.active]="activeBottomTab === 'explore'" (click)="setBottomTab('explore')">
      <ion-icon name="compass-outline"></ion-icon>
      <span>Explore</span>
    </button>

    <button type="button" class="nav-item nav-item--create" [class.active]="activeBottomTab === 'create'" (click)="setBottomTab('create')" aria-label="Create">
      <div class="create-fab">
        <ion-icon name="add-outline"></ion-icon>
      </div>
    </button>

    <button type="button" class="nav-item active" aria-label="Users">
      <ion-icon name="people-outline"></ion-icon>
      <span>User</span>
    </button>

    <button type="button" class="nav-item" [class.active]="activeBottomTab === 'profile'" (click)="setBottomTab('profile')">
      <ion-icon name="person-outline"></ion-icon>
      <span>Profile</span>
    </button>
  </div>
</ion-content>
